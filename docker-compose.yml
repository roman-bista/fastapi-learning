services:

  postgres:
    image: postgres:16

    container_name: postgres-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: roman
      POSTGRES_DB: TodoApplicationDatabase

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  fastapi:

    build: .

    container_name: fastapi-app

    depends_on:
      - postgres

    ports:
      - "8000:8000"

volumes:
  postgres_data: